title: Service
tabs:
  main:
    display: Main
    sections:
      - display: Getting started
        instructions: |-
          **To add or edit a service page**
          1. Find **"★ TEMPLATE — Duplicate me"** in the entry list (keep it as a draft — never publish it).
          2. To start a new service, open its **⋯** menu and choose **Duplicate**.
          3. Fill in the service name, lead copy, capabilities, approach blocks, and hero image.
          4. Use **Show in Navigation** and **Show on Homepage Strip** to control where the service appears. Set **Navigation Order** to control position (lower numbers appear first).
          5. **Publish** when ready. Projects linked under **Services Provided** automatically appear in the Recent Projects carousel.

          **Do not publish or delete the template entry.** New service pages may need a developer to wire up design before going live.
        fields:
          - handle: title
            field:
              type: text
              display: Title
              required: true
          - handle: service_name
            field:
              type: text
              display: Service Name
              instructions: The service discipline shown in the hero, e.g. 'architecture', 'civil engineering', 'interior design'.
              required: true
          - handle: nav_label
            field:
              type: text
              display: Navigation Label
              instructions: Short label used in the site header navigation (e.g. 'Civil', 'Interior Design'). Falls back to the service name when empty.
          - handle: nav_order
            field:
              type: integer
              display: Navigation Order
              instructions: Controls ordering in the header navigation and homepage services strip. Lower numbers appear first.
              default: 100
          - handle: show_in_nav
            field:
              type: toggle
              display: Show in Navigation
              instructions: When enabled, this service appears in the site header Services menu.
              default: true
          - handle: show_on_homepage_strip
            field:
              type: toggle
              display: Show on Homepage Strip
              instructions: When enabled, this service appears in the circular icon strip on the homepage. Requires strip icon assets below.
              default: false
          - handle: strip_icon
            field:
              type: assets
              display: Homepage Strip Icon
              container: main
              folder: uploads/icons
              max_files: 1
              instructions: Circular icon shown in the homepage services strip.
          - handle: strip_icon_url
            field:
              type: text
              display: Homepage Strip Icon URL (imported)
              instructions: Legacy imported icon path for the homepage services strip.
          - handle: strip_hover_image
            field:
              type: assets
              display: Homepage Strip Hover Image
              container: main
              folder: uploads/services
              max_files: 1
              instructions: Photo shown on hover in the homepage services strip.
          - handle: strip_hover_image_url
            field:
              type: text
              display: Homepage Strip Hover Image URL (imported)
              instructions: Legacy imported hover image path for the homepage services strip.
          - handle: tagline
            field:
              type: text
              display: Tagline
              instructions: The short pre-heading or motto displayed above the service name (e.g. 'We listen. We design. We deliver.'). May be missing.
          - handle: lead_heading
            field:
              type: text
              display: Lead Heading
              instructions: The primary H2/H3 below the hero that frames the value proposition.
              required: true
          - handle: intro_prose
            field:
              type: textarea
              display: Intro Prose
              instructions: The paragraph(s) of body copy immediately after the lead heading, joined with double newlines.
          - handle: capabilities
            field:
              type: list
              display: Capabilities
              instructions: Bulleted capabilities/disciplines shown on the page, in order.
              required: true
          - handle: approach_heading
            field:
              type: text
              display: Approach Heading
              instructions: Heading of the methodology section (e.g. 'Our Architectural Approach'). May be missing.
          - handle: approach_intro_prose
            field:
              type: textarea
              display: Approach Intro Prose
              instructions: Short paragraph below the approach heading, before the accordion of approach blocks.
          - handle: mid_image
            field:
              type: assets
              display: Mid-section Image
              container: main
              folder: uploads/services
              max_files: 1
              instructions: Full-bleed photograph between the lead block and the approach section.
          - handle: mid_image_url
            field:
              type: text
              display: Mid-section Image URL (imported)
          - handle: approach_blocks
            field:
              type: grid
              mode: stacked
              fields:
                - handle: title
                  field:
                    type: text
                    display: Approach Blocks Title
                - handle: body
                  field:
                    type: textarea
                    display: Approach Blocks Body
              display: Approach Blocks
              instructions: Sub-sections under the approach heading; typically 4 cards (e.g. Comprehensive Research, Community Feedback, Design Charettes, Concept Sketches).
          - handle: team_leaders
            field:
              type: grid
              mode: stacked
              fields:
                - handle: name
                  field:
                    type: text
                    display: Team Leaders Name
                - handle: title
                  field:
                    type: text
                    display: Team Leaders Title
                    instructions: Role / job title under the name.
                - handle: team_url
                  field:
                    type: text
                    display: Team Leaders Team Url
                    instructions: Link to /team/{slug}/
                - handle: headshot
                  field:
                    type: assets
                    display: Headshot
                    container: main
                    folder: uploads/team
                    max_files: 1
                - handle: headshot_url
                  field:
                    type: text
                    display: Team Leaders Headshot Url (imported)
                - handle: linkedin_url
                  field:
                    type: text
                    display: Team Leaders Linkedin Url
                - handle: email
                  field:
                    type: text
                    input_type: email
                    display: Team Leaders Email
              display: Team Leaders
              instructions: Team leader cards shown on the service page. Each links to a /team/{slug}/ profile.
          - handle: recent_projects
            field:
              type: grid
              mode: stacked
              fields:
                - handle: title
                  field:
                    type: text
                    display: Recent Projects Title
                - handle: url
                  field:
                    type: text
                    display: Recent Projects Url
                    instructions: Absolute URL to /project/{slug}/
                - handle: categories
                  field:
                    type: list
                    display: Recent Projects Categories
                    instructions: Comma-separated category tags shown under each project link.
                - handle: image
                  field:
                    type: assets
                    display: Thumbnail
                    container: main
                    folder: uploads/projects
                    max_files: 1
                - handle: image_url
                  field:
                    type: text
                    display: Recent Projects Image Url (imported)
              display: Recent Projects
              instructions: Deprecated — the Recent Projects carousel is now populated automatically from the Projects collection.
          - handle: hero_image
            field:
              type: assets
              display: Hero Image
              container: main
              folder: uploads/services
              max_files: 1
          - handle: hero_image_url
            field:
              type: text
              display: Hero Image Url (imported)
              instructions: Hero image at the top of the page if any. May be missing.
  seo:
    display: SEO & Source
    sections:
      - fields:
          - handle: source_url
            field:
              type: text
              display: Source URL
              instructions: The original WordPress URL this entry was imported from (for traceability).
          - handle: seo_title
            field:
              type: text
              display: SEO title
          - handle: seo_description
            field:
              type: textarea
              display: SEO description
          - handle: seo_og_image
            field:
              type: assets
              display: OG Image
              container: main
              folder: uploads
              max_files: 1
          - handle: seo_og_image_url
            field:
              type: text
              display: OG image URL (imported)
