title: Page
tabs:
  main:
    display: Main
    sections:
      - fields:
          - handle: title
            field:
              type: text
              display: Title
              required: true
          - handle: url
            field:
              type: text
              display: URL override
              instructions: >-
                Absolute path (starting with /) that this entry should serve at. Statamic uses this as the route override, allowing different entries in this collection to live at different URL shapes
                (e.g. /healthcare/ vs /industry/civil-engineering/).
              required: true
          - handle: hero_overlay_heading
            field:
              type: text
              display: Hero Overlay Heading
              instructions: Primary heading shown over the hero (often 'We listen. We design. We deliver.' or similar).
              required: true
          - handle: hero_overlay_subheading
            field:
              type: text
              display: Hero Overlay Subheading
              instructions: Secondary subheading beneath the primary.
          - handle: hero_image
            field:
              type: assets
              display: Hero Image
              container: main
              folder: uploads/pages
              max_files: 1
              instructions: Upload or browse for the hero background image.
          - handle: hero_image_url
            field:
              type: text
              display: Hero Image Url (imported)
              instructions: Legacy imported path. Use Hero Image above for new uploads.
          - handle: hero_video_url
            field:
              type: text
              display: Hero Video Url
              instructions: URL of the hero video if used.
          - handle: services_strip
            field:
              type: grid
              mode: stacked
              fields:
                - handle: label
                  field:
                    type: text
                    display: Services Strip Label
                - handle: url
                  field:
                    type: text
                    display: Services Strip Url
                - handle: icon
                  field:
                    type: assets
                    display: Icon
                    container: main
                    folder: uploads/icons
                    max_files: 1
                - handle: icon_url
                  field:
                    type: text
                    display: Services Strip Icon Url (imported)
                - handle: hover_image
                  field:
                    type: assets
                    display: Hover Preview Image
                    container: main
                    folder: uploads/services
                    max_files: 1
                    instructions: Photo shown on hover beneath the service icon. Swap this out when final assets are ready.
                - handle: hover_image_url
                  field:
                    type: text
                    display: Hover Preview Image URL (imported)
                    instructions: Legacy imported path. Use Hover Preview Image above for new uploads.
              display: Services Strip
              instructions: Deprecated — the homepage services strip is now populated automatically from Services entries with “Show on Homepage Strip” enabled.
          - handle: believe_in_blocks
            field:
              type: grid
              mode: stacked
              fields:
                - handle: title
                  field:
                    type: text
                    display: Believe In Blocks Title
                    instructions: Block title (e.g. 'We believe in collaboration').
                - handle: body
                  field:
                    type: textarea
                    display: Believe In Blocks Body
                    instructions: Block body prose.
                - handle: lottie_url
                  field:
                    type: text
                    display: Believe In Blocks Lottie URL
                    instructions: Path to a Lottie JSON animation file for the block icon (e.g. /assets/imported/2023/06/Brainwave.json).
                - handle: bg_image
                  field:
                    type: assets
                    display: Background Image
                    container: main
                    folder: uploads/pages
                    max_files: 1
                    instructions: Full-bleed background photo for this block.
                - handle: bg_image_url
                  field:
                    type: text
                    display: Believe In Blocks Background Image URL (imported)
              display: Believe In Blocks
              instructions: Repeating 'WE BELIEVE IN' blocks. Order matters.
          - handle: featured_projects
            field:
              type: grid
              mode: stacked
              fields:
                - handle: title
                  field:
                    type: text
                    display: Featured Projects Title
                - handle: url
                  field:
                    type: text
                    display: Featured Projects Url
                - handle: image
                  field:
                    type: assets
                    display: Thumbnail
                    container: main
                    folder: uploads/projects
                    max_files: 1
                - handle: image_url
                  field:
                    type: text
                    display: Featured Projects Image Url (imported)
                - handle: categories
                  field:
                    type: list
                    display: Featured Projects Categories
              display: Featured Projects
              instructions: Curated 3×2 grid on the homepage. Order matters. Use thumbnails from assets/images/home/feature-projects/ for the custom crop shown on the live site.
          - handle: stats_counters
            field:
              type: grid
              mode: stacked
              fields:
                - handle: label
                  field:
                    type: text
                    display: Stats Counters Label
                    instructions: What the counter measures (e.g. 'Years of Experience', 'Projects Delivered').
                - handle: value_text
                  field:
                    type: text
                    display: Stats Counters Value Text
                    instructions: The displayed value, often with suffix (e.g. '45+', '500').
              display: Stats Counters
              instructions: Stat/counter blocks on the homepage.
          - handle: testimonials
            field:
              type: grid
              mode: stacked
              fields:
                - handle: quote
                  field:
                    type: textarea
                    display: Testimonials Quote
                - handle: attribution_name
                  field:
                    type: text
                    display: Testimonials Attribution Name
                - handle: attribution_org
                  field:
                    type: text
                    display: Testimonials Attribution Org
              display: Testimonials
          - handle: cta_heading
            field:
              type: text
              display: Cta Heading
              instructions: Heading of the final contact / CTA section (e.g. 'Have a project in mind?').
          - handle: cta_subheading
            field:
              type: text
              display: Cta Subheading
              instructions: Subheading of the CTA section (e.g. 'Let's talk.').
          - handle: cta_body
            field:
              type: textarea
              display: Cta Body
              instructions: Optional supporting prose for the CTA.
  seo:
    display: SEO & Source
    sections:
      - fields:
          - handle: source_url
            field:
              type: text
              display: Source URL
              instructions: The original WordPress URL this entry was imported from (for traceability).
          - handle: seo_title
            field:
              type: text
              display: SEO title
          - handle: seo_description
            field:
              type: textarea
              display: SEO description
          - handle: seo_og_image
            field:
              type: assets
              display: OG Image
              container: main
              folder: uploads
              max_files: 1
          - handle: seo_og_image_url
            field:
              type: text
              display: OG image URL (imported)
