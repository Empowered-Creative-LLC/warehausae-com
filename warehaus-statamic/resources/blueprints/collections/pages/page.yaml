title: Page
tabs:
  main:
    display: Main
    sections:
      - fields:
          - handle: title
            field:
              type: text
              display: Title
              required: true
          - handle: url
            field:
              type: text
              display: URL override
              instructions: >-
                Absolute path (starting with /) that this entry should serve at. Statamic uses this as the route override, allowing different entries in this collection to live at different URL shapes
                (e.g. /healthcare/ vs /industry/civil-engineering/).
              required: true
          - handle: tagline
            field:
              type: text
              display: Tagline
              instructions: Secondary heading or pre-hero tagline shown above the title (e.g. 'We listen. We design. We deliver.' or the 'WAREHAUS' branding label).
          - handle: hero_image
            field:
              type: assets
              display: Hero Image
              container: main
              folder: uploads/pages
              max_files: 1
              instructions: Hero background for watermark hero pages (about, culture, etc.).
          - handle: hero_image_url
            field:
              type: text
              display: Hero Image Url (imported)
              instructions: Legacy imported hero path used by watermark hero partial.
          - handle: lead_heading
            field:
              type: text
              display: Lead Heading
              instructions: First H2 below the title framing the page (e.g. 'Deep Roots. Rich History.' on /about/).
          - handle: intro_prose
            field:
              type: textarea
              display: Intro Prose
              instructions: Paragraph(s) immediately after the lead heading.
          - handle: intro_image
            field:
              type: assets
              display: Intro Image
              container: main
              folder: uploads/pages
              max_files: 1
              instructions: Optional image below the intro prose (e.g. co-owners photo on /about/).
          - handle: intro_image_url
            field:
              type: text
              display: Intro Image Url (imported)
          - handle: mission_prose
            field:
              type: textarea
              display: Mission Prose
              instructions: Body copy for the Our Mission band (e.g. on /about/).
          - handle: leadership_slugs
            field:
              type: list
              display: Leadership Team Slugs
              instructions: Deprecated — the About page leadership section is now populated automatically from team members with “Show on About Page” enabled.
          - handle: news_slugs
            field:
              type: list
              display: News Feed Slugs
              instructions: News post entry slugs for the embedded news feed, in display order.
          - handle: sections
            field:
              type: grid
              mode: stacked
              fields:
                - handle: heading
                  field:
                    type: text
                    display: Sections Heading
                    instructions: Section H2 or H3.
                - handle: body
                  field:
                    type: textarea
                    display: Sections Body
                    instructions: Section body prose, joined with double newlines.
                - handle: images
                  field:
                    type: grid
                    mode: stacked
                    fields:
                      - handle: image
                        field:
                          type: assets
                          display: Image
                          container: main
                          folder: uploads/pages
                          max_files: 1
                      - handle: url
                        field:
                          type: text
                          display: Images Url (imported)
                      - handle: alt
                        field:
                          type: text
                          display: Images Alt
                    display: Sections Images
              display: Sections
              instructions: Named sections under H2/H3 headings, in document order.
          - handle: leadership_cards
            field:
              type: grid
              mode: stacked
              fields:
                - handle: name
                  field:
                    type: text
                    display: Leadership Cards Name
                - handle: title
                  field:
                    type: text
                    display: Leadership Cards Title
                - handle: team_url
                  field:
                    type: text
                    display: Leadership Cards Team Url
                - handle: headshot
                  field:
                    type: assets
                    display: Headshot
                    container: main
                    folder: uploads/team
                    max_files: 1
                - handle: headshot_url
                  field:
                    type: text
                    display: Leadership Cards Headshot Url (imported)
                - handle: linkedin_url
                  field:
                    type: text
                    display: Leadership Cards Linkedin Url
                - handle: email
                  field:
                    type: text
                    input_type: email
                    display: Leadership Cards Email
              display: Leadership Cards
              instructions: Leadership team cards if shown (e.g. on /about/).
          - handle: news_feed
            field:
              type: grid
              mode: stacked
              fields:
                - handle: title
                  field:
                    type: text
                    display: News Feed Title
                - handle: url
                  field:
                    type: text
                    display: News Feed Url
                - handle: image
                  field:
                    type: assets
                    display: Thumbnail
                    container: main
                    folder: uploads/news
                    max_files: 1
                - handle: image_url
                  field:
                    type: text
                    display: News Feed Image Url (imported)
                - handle: categories
                  field:
                    type: list
                    display: News Feed Categories
                - handle: date_text
                  field:
                    type: text
                    display: News Feed Date Text
              display: News Feed
              instructions: Embedded news feed if shown (e.g. on /about/).
          - handle: raw_body_markdown
            field:
              type: markdown
              display: Raw Body Markdown
              instructions: The entire body of the page in markdown form (everything below the global header), used as a fallback for fidelity.
  seo:
    display: SEO & Source
    sections:
      - fields:
          - handle: source_url
            field:
              type: text
              display: Source URL
              instructions: The original WordPress URL this entry was imported from (for traceability).
          - handle: seo_title
            field:
              type: text
              display: SEO title
          - handle: seo_description
            field:
              type: textarea
              display: SEO description
          - handle: seo_og_image
            field:
              type: assets
              display: OG Image
              container: main
              folder: uploads
              max_files: 1
          - handle: seo_og_image_url
            field:
              type: text
              display: OG image URL (imported)
