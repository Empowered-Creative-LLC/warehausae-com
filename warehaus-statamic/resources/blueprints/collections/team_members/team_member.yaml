title: Team Member
tabs:
  main:
    display: Main
    sections:
      - display: Getting started
        instructions: |-
          **To add a team member**
          1. Click **Create Entry** and enter the person's full **Name** as it should appear on the page.
          2. Upload a **Headshot**, write the **Bio**, and add contact details (email, phone, LinkedIn).
          3. Toggle **Show on About Page** to include them in the leadership section on `/about/`. Use **About Page Order** to control position (lower numbers appear first).
          4. **Publish** when ready. The profile is available at `/team/member-slug/`.

          Ignore the legacy "Headshot Url (imported)" field unless restoring old imported content.
        fields:
          - handle: title
            field:
              type: text
              display: Title
              required: true
          - handle: name
            field:
              type: text
              display: Name
              instructions: The team member's full name as shown in the H1 (e.g. 'Dan Creep', 'Troy Bankert, AIA').
              required: true
          - handle: show_on_about
            field:
              type: toggle
              display: Show on About Page
              instructions: When enabled, this team member appears in the leadership section on the About page.
              default: true
          - handle: about_order
            field:
              type: integer
              display: About Page Order
              instructions: Controls ordering in the About page leadership section. Lower numbers appear first.
              default: 100
          - handle: first_name
            field:
              type: text
              display: First Name
              instructions: First name used in the contact card heading (e.g. 'Dan', 'Jeff'). Often shorter than the full name.
          - handle: discipline
            field:
              type: text
              display: Discipline
              instructions: >-
                The service discipline this team member primarily belongs to (architecture, civil engineering, structural, interior design, historic preservation, etc.), inferred from title and bio if
                not explicit.
          - handle: headshot
            field:
              type: assets
              display: Headshot
              container: main
              folder: uploads/team
              max_files: 1
              instructions: Upload or browse for the profile photo.
          - handle: headshot_url
            field:
              type: text
              display: Headshot Url (imported)
              instructions: Legacy imported path. Use Headshot above for new uploads.
          - handle: years_in_industry
            field:
              type: integer
              display: Years In Industry
              instructions: Number from the 'Years in Industry' label, if present.
          - handle: years_with_warehaus
            field:
              type: integer
              display: Years With Warehaus
              instructions: Number from the 'Years with Warehaus' label, if present.
          - handle: bio
            field:
              type: textarea
              display: Bio
              instructions: Multi-paragraph biography prose joined with double newlines. Preserve exact wording.
              required: true
          - handle: education
            field:
              type: text
              display: Education
              instructions: Education sentence(s) if mentioned in the bio (e.g. 'Dan holds a degree in Civil Engineering Technology from the University of Pittsburgh-Johnstown.'). Leave empty if not present.
          - handle: contact_blurb
            field:
              type: text
              display: Contact Blurb
              instructions: The short prompt above the email/phone (e.g. 'Have a project with civil engineering needs? Connect with Dan to discuss.').
          - handle: email
            field:
              type: text
              input_type: email
              display: Email
              instructions: "Direct email address (e.g. dcreep@warehausae.com). No mailto: prefix."
          - handle: phone
            field:
              type: text
              display: Phone
              instructions: Phone number as displayed (e.g. '(717) 815-8503').
          - handle: linkedin_url
            field:
              type: text
              display: Linkedin Url
              instructions: LinkedIn profile URL if shown anywhere on the page.
  seo:
    display: SEO & Source
    sections:
      - fields:
          - handle: source_url
            field:
              type: text
              display: Source URL
              instructions: The original WordPress URL this entry was imported from (for traceability).
          - handle: seo_title
            field:
              type: text
              display: SEO title
          - handle: seo_description
            field:
              type: textarea
              display: SEO description
          - handle: seo_og_image
            field:
              type: assets
              display: OG Image
              container: main
              folder: uploads
              max_files: 1
          - handle: seo_og_image_url
            field:
              type: text
              display: OG image URL (imported)
