title: News Post
tabs:
  main:
    display: Main
    sections:
      - fields:
          - handle: title
            field:
              type: text
              display: Title
              required: true
          - handle: url
            field:
              type: text
              display: URL override
              instructions: >-
                Absolute path (starting with /) that this entry should serve at. Statamic uses this as the route override, allowing different entries in this collection to live at different URL shapes
                (e.g. /healthcare/ vs /industry/civil-engineering/).
              required: true
          - handle: published_date_text
            field:
              type: text
              display: Published Date Text
              instructions: Date as displayed (literal). May be relative like '5 months ago' or absolute like 'December 15, 2025'.
          - handle: featured_image_url
            field:
              type: text
              display: Featured Image Url
              instructions: URL of the lead/featured image at the top of the post.
          - handle: categories
            field:
              type: grid
              mode: stacked
              fields:
                - handle: label
                  field:
                    type: text
                    display: Categories Label
                    instructions: Category name (e.g. 'Around the Haus', 'News').
                - handle: url
                  field:
                    type: text
                    display: Categories Url
                    instructions: Absolute URL to /Industries/{slug}/ (preserve capitalization).
              display: Categories
              instructions: Category tags shown above or below the title.
          - handle: body_markdown
            field:
              type: markdown
              display: Body Markdown
              instructions: Full body of the post in markdown form. Preserve image references inline.
              required: true
          - handle: inline_images
            field:
              type: grid
              mode: stacked
              fields:
                - handle: url
                  field:
                    type: text
                    display: Inline Images Url
                - handle: alt
                  field:
                    type: text
                    display: Inline Images Alt
              display: Inline Images
              instructions: All images that appear in the post (deduplicated).
  seo:
    display: SEO & Source
    sections:
      - fields:
          - handle: source_url
            field:
              type: text
              display: Source URL
              instructions: The original WordPress URL this entry was imported from (for traceability).
          - handle: seo_title
            field:
              type: text
              display: SEO title
          - handle: seo_description
            field:
              type: textarea
              display: SEO description
          - handle: seo_og_image_url
            field:
              type: text
              display: OG image URL
