title: News Post
tabs:
  main:
    display: Main
    sections:
      - display: Getting started
        instructions: |-
          **To add a news post**
          1. Click **Create Entry** and enter a **Title** (the URL is automatic: `/news/your-title-slug/`).
          2. Set the **Published Date** (this controls the order on the News page — newest first), add an optional **Subtitle**, and a **Featured Image**.
          3. Write the article in **Body Markdown**. Use the image button to upload photos inside the body.
          4. **Publish** when ready. The post appears on the homepage news section and on `/news/`.

          Ignore the legacy "Featured Image Url (imported)" and "Categories Url" fields unless restoring old imported content.
        fields:
          - handle: title
            field:
              type: text
              display: Title
              required: true
          - handle: subtitle
            field:
              type: text
              display: Subtitle / Descriptor
              instructions: Optional short italic descriptor shown below the title. Matches the italicised lead sentence on some WordPress posts.
          - handle: date
            field:
              type: date
              display: Published Date
              instructions: The article's publish date. Controls the order on the News page (newest first).
              required: true
          - handle: featured_image
            field:
              type: assets
              display: Featured Image
              container: main
              folder: uploads/news
              max_files: 1
              instructions: Upload or browse for the lead image at the top of the post.
          - handle: featured_image_url
            field:
              type: text
              display: Featured Image Url (imported)
              instructions: Legacy imported path. Use Featured Image above for new uploads.
          - handle: categories
            field:
              type: grid
              mode: stacked
              fields:
                - handle: label
                  field:
                    type: text
                    display: Categories Label
                    instructions: Category name (e.g. 'Around the Haus', 'News').
                - handle: url
                  field:
                    type: text
                    display: Categories Url
                    instructions: Absolute URL to /Industries/{slug}/ (preserve capitalization).
              display: Categories
              instructions: Category tags shown above or below the title.
          - handle: body_markdown
            field:
              type: markdown
              display: Body Markdown
              instructions: Full body of the post in markdown form. Preserve image references inline.
              required: true
          - handle: inline_images
            field:
              type: grid
              mode: stacked
              fields:
                - handle: url
                  field:
                    type: text
                    display: Inline Images Url
                - handle: alt
                  field:
                    type: text
                    display: Inline Images Alt
              display: Inline Images
              instructions: All images that appear in the post (deduplicated).
  seo:
    display: SEO & Source
    sections:
      - fields:
          - handle: source_url
            field:
              type: text
              display: Source URL
              instructions: The original WordPress URL this entry was imported from (for traceability).
          - handle: seo_title
            field:
              type: text
              display: SEO title
          - handle: seo_description
            field:
              type: textarea
              display: SEO description
          - handle: seo_og_image
            field:
              type: assets
              display: OG Image
              container: main
              folder: uploads
              max_files: 1
          - handle: seo_og_image_url
            field:
              type: text
              display: OG image URL (imported)
