title: Job Posting
tabs:
  main:
    display: Main
    sections:
      - display: Getting started
        instructions: |-
          **To add a job posting**
          1. Click **Create Entry** and enter the job **Title** (e.g. "Civil Designer").
          2. Add department, location, employment type, and posted date.
          3. Write the **Overview**, then add bullet lists for **Responsibilities**, **Qualifications**, and **Benefits**.
          4. Add an **Apply URL** (link to the application page) or **Apply Email**.
          5. **Publish** when ready. Open positions appear on the `/careers/` page automatically.
        fields:
          - handle: title
            field:
              type: text
              display: Title
              required: true
          - handle: department
            field:
              type: text
              display: Department
              instructions: Department/team (e.g. 'Civil Engineering', 'Architecture'). May be missing.
          - handle: location
            field:
              type: text
              display: Location
              instructions: Job location (e.g. 'York, PA', 'Remote', 'Hybrid'). May be missing.
          - handle: employment_type
            field:
              type: text
              display: Employment Type
              instructions: Employment type (e.g. 'Full-time', 'Part-time', 'Contract'). May be missing.
          - handle: posted_date
            field:
              type: text
              display: Posted Date
              instructions: Date posted, as displayed (e.g. 'April 23, 2026'). Shown on the careers page job cards.
          - handle: posted_time
            field:
              type: text
              display: Posted Time
              instructions: Optional legacy field (e.g. '9:57 am'). Not shown on the careers page — date only is displayed.
          - handle: overview
            field:
              type: textarea
              display: Overview
              instructions: Role overview / intro prose, joined with double newlines.
              required: true
          - handle: responsibilities
            field:
              type: list
              display: Responsibilities
              instructions: Bulleted responsibilities.
          - handle: qualifications
            field:
              type: list
              display: Qualifications
              instructions: Bulleted qualifications / required skills / experience.
          - handle: benefits
            field:
              type: list
              display: Benefits
              instructions: Bulleted benefits or perks.
          - handle: apply_url
            field:
              type: text
              input_type: url
              display: Apply Url
              instructions: URL or mailto behind an 'Apply' button if present.
          - handle: apply_email
            field:
              type: text
              input_type: email
              display: Apply Email
              instructions: Email to send applications to, if displayed.
  seo:
    display: SEO & Source
    sections:
      - fields:
          - handle: source_url
            field:
              type: text
              display: Source URL
              instructions: The original WordPress URL this entry was imported from (for traceability).
          - handle: seo_title
            field:
              type: text
              display: SEO title
          - handle: seo_description
            field:
              type: textarea
              display: SEO description
          - handle: seo_og_image
            field:
              type: assets
              display: OG Image
              container: main
              folder: uploads
              max_files: 1
          - handle: seo_og_image_url
            field:
              type: text
              display: OG image URL (imported)
