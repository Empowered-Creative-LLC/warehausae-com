<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ title }} | {{ seo_defaults:site_title_pattern | replace:'{title}':'Warehaus' }}</title>
    {{ if seo_description }}<meta name="description" content="{{ seo_description }}">{{ /if }}
    <link rel="canonical" href="{{ permalink }}">
    {{ vite src="resources/css/app.css|resources/js/app.js" }}
</head>
<body class="bg-white text-stone-900 antialiased">
    <header class="border-b border-stone-200 px-6 py-4">
        <a href="/" class="font-semibold text-xl tracking-tight">Warehaus</a>
    </header>

    <main class="mx-auto max-w-4xl px-6 py-12">
        {{ template_content }}
    </main>

    <footer class="border-t border-stone-200 mt-24 px-6 py-8 text-sm text-stone-600">
        <p>{{ site_info:address_line_1 }} · {{ site_info:address_line_2 }} · {{ site_info:phone }} · <a href="mailto:{{ site_info:email }}">{{ site_info:email }}</a></p>
        <p class="mt-2 text-stone-400">Migration in progress — Phase 6 placeholder layout.</p>
    </footer>
</body>
</html>
